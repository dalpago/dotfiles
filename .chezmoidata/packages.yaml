base:
  darwin:
    brews:
      - age
      - chezmoi
      - fzf
      - git
      - git-delta
      - gnupg
      - starship
      - uv
      - vim
      - zoxide
      - zsh
    casks:
      - iterm2

  debian:
    apt:
      - age
      - fzf
      - git
      - gnupg
      - vim
      - zsh

categories:
  development:
    darwin:
      brews:
        - git-extras
        - git-filter-repo
        - node
        - python@3.13
        - sqlite
    debian:
      apt:
        - git-extras
        - python3
        - python3-pip
        - python3-venv
        - sqlite3
    npm: []

  cli-tools:
    darwin:
      brews:
        - bat
        - eza
        - fd
        - htop
        - mosh
        - pandoc
        - ripgrep
        - tea
        - tmux
    debian:
      apt:
        - bat
        - fd-find
        - htop
        - mosh
        - ripgrep
        - tmux
    npm:
      - "@mermaid-js/mermaid-cli"

  security:
    darwin:
      brews:
        - pass
        - wireguard-go
        - wireguard-tools
    debian:
      apt:
        - pass
    npm: []

  desktop-apps:
    darwin:
      casks:
        - ferdium
        - libreoffice
    debian:
      apt: []
    npm: []

  work:
    darwin:
      brews:
        - mysql-client
      casks:
        - microsoft-teams
        - pycharm
    debian:
      apt:
        - texlive-latex-base
        - texlive-latex-extra
    npm: []

uv_python:
  packages:
    - requests
    - pyyaml
